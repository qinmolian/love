<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>给你的心意</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="background-blur blur-a"></div>
  <div class="background-blur blur-b"></div>
  <div class="background-blur blur-c"></div>

  <main class="app">
    <section class="question-stage" id="questionStage" aria-live="polite">
      <div class="question-card" id="questionCard">
        <p class="question-card__label">悄悄问你</p>
        <h2 class="question-card__title" id="questionTitle">你喜欢我吗</h2>
        <div class="question-card__buttons" id="answerButtons">
          <button class="answer-btn" type="button">喜欢</button>
          <button class="answer-btn answer-btn--strong" type="button">很喜欢</button>
        </div>
      </div>
    </section>

    <section class="message-banner" id="messageBanner" hidden aria-live="polite">
      <div class="message-banner__glow"></div>
      <p>我也喜欢你妹妹 每天都想你</p>
    </section>

    <section class="heart-stage" id="heartStage" hidden>
      <div class="heart-wrap" id="heartWrap">
        <div class="heart-cloud" id="heartCloud" aria-hidden="true"></div>
        <button class="heart-center-btn" id="heartToggle" type="button">点击</button>
        <article class="center-wish" id="centerWish" hidden tabindex="-1" aria-live="polite">
          <div class="center-wish__content">
            <p class="center-wish__eyebrow">给妹妹的小纸条</p>
            <h3 class="center-wish__title">巅峰赛加油妹妹</h3>
            <p class="center-wish__lead">把这一句加油，认真地铺开给你看。</p>
            <div class="center-wish__body">
              <p>愿你今天手感热热的，判断稳稳的，连胜和好心情一起慢慢靠近你。</p>
              <p>就算偶尔有一局不太顺，也别让小失落抢走你的光。你本来就很厉害，也一直都很特别。</p>
              <p>你负责专心发光，我负责把偏爱和祝福悄悄送到你面前。每一把都希望你赢得漂亮，也玩得开心。</p>
            </div>
            <p class="center-wish__footer">抬头的时候，记得我一直在替你加油。</p>
          </div>
        </article>
      </div>
    </section>
  </main>

  <script src="script.js"></script>
</body>
</html>
